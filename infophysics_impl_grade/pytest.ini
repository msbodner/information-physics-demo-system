[pytest]
# Pytest config for the InformationPhysics API.
#
# - testpaths limits discovery to tests/ so pytest doesn't wander into
#   migrations/ or seeds/.
# - pythonpath = . lets tests `from api...` without installing the pkg.
# - filterwarnings silences pydantic v2 deprecation noise from FastAPI.
testpaths = tests
pythonpath = .
addopts = -ra --strict-markers
markers =
    integration: requires a live DATABASE_URL; skipped otherwise
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:fastapi.*

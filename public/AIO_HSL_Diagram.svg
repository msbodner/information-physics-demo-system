  <text x="730" y="785" font-size="11" font-style="italic" fill="#606060">
    each shares [ProjectManager.Destiny Owens]
  </text>

  <!-- ================================================================== -->
  <!-- Explanation box at bottom                                          -->
  <!-- ================================================================== -->
  <rect x="40" y="820" width="1320" height="200" rx="8" fill="#F5F9FC" stroke="#CCCCCC" stroke-width="1"/>

  <text x="60" y="848" font-size="14" font-weight="bold" fill="#1F4E79">How to read this diagram</text>

  <g font-size="12" fill="#333">
    <text x="60" y="875">
      <tspan font-weight="bold" fill="#1F4E79">Top: the AIO body.</tspan>
      <tspan> One AIO is a self-describing record made of many bracketed elements — each a semantic-label and value bound together at capture time.</tspan>
    </text>
    <text x="60" y="898">
      <tspan>The highlighted yellow element, </tspan>
      <tspan font-family="Courier New, monospace" fill="#92400E" font-weight="bold">[ProjectManager.Destiny Owens]</tspan>
      <tspan>, is just one of roughly 35 elements inside this single AIO.</tspan>
    </text>
    <text x="60" y="925">
      <tspan font-weight="bold" fill="#1F4E79">Bottom: the HSL string.</tspan>
      <tspan> The HSL file </tspan>
      <tspan font-family="Courier New, monospace" fill="#92400E">[ProjectManager.Destiny Owens].hsl</tspan>
      <tspan> is a precomputed string that threads through every AIO in the corpus</tspan>
    </text>
    <text x="60" y="948">
      <tspan>that contains this same element. Each small box along the string is a different AIO — 44 in total for this HSL — representing a different project Destiny manages.</tspan>
    </text>
    <text x="60" y="975">
      <tspan font-weight="bold" fill="#1F4E79">Why this matters:</tspan>
      <tspan> when the system needs to answer </tspan>
      <tspan font-style="italic">"show me everything Destiny is managing,"</tspan>
      <tspan> it does not search the corpus. It walks this one string.</tspan>
    </text>
    <text x="60" y="998">
      <tspan>Retrieval is bounded traversal over a precomputed topology rather than approximate similarity search — exact, auditable, and orders of magnitude cheaper than conventional RAG.</tspan>
    </text>
  </g>
</svg>

    <rect x="280" y="380" width="16" height="14" fill="#E8F4F8" stroke="#1F4E79"/>
    <text x="302" y="391" fill="#606060">Observed element (semantic label • value)</text>

    <rect x="560" y="380" width="16" height="14" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
    <text x="582" y="391" fill="#606060" font-weight="bold">The shared element that the HSL threads through →</text>

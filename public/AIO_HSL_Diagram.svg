<svg viewBox="0 0 1400 1050" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <!-- Drop shadow for boxes -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrow marker for connection lines -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F4E79"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#1F4E79">
    AIO Body and the HSL String
  </text>
  <text x="700" y="62" text-anchor="middle" font-size="14" fill="#606060" font-style="italic">
    One AIO holds many elements. The HSL is a string threading through one shared element across many AIOs.
  </text>

  <!-- ================================================================== -->
  <!-- AIO BODY SECTION (top half)                                       -->
  <!-- ================================================================== -->
  <text x="40" y="110" font-size="16" font-weight="bold" fill="#1F4E79">AIO BODY</text>
  <text x="40" y="130" font-size="12" fill="#606060" font-style="italic">
    A single self-describing object — PRJ-499 Highland Resort &amp; Spa
  </text>

  <!-- AIO container box -->

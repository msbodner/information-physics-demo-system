<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIO System App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0F3460 0%, #1A5276 50%, #2E86C1 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .logo {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .logo .accent { color: #22c55e; }
    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 32px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      min-height: 20px;
    }
    .copyright {
      position: absolute;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span class="accent">AIO</span> System App</div>
    <div class="subtitle">InformationPhysics.ai &mdash; V2.1a</div>
    <div class="spinner"></div>
    <div id="status">Starting services...</div>
  </div>
  <div class="copyright">&copy; 2026 InformationPhysics.ai, LLC</div>
</body>
</html>
